# Engineer Agent Configuration
# Location: ~/.claude/engineer-agent/engineer.yaml
# Run /engineer setup to create this file automatically.

agent:
  branch_prefix: "engineer-agent"
  max_pr_files: 50
  standup_channel: "C98765432"
  digest_channel: "C98765432"
  cron_interval_minutes: 15

  # Slack access via the Spy CLI (https://github.com/tomharris/spy) — no OAuth/app install;
  # spy reuses your local Slack desktop session. Sign in to Slack desktop, then run
  # `spy auth` to confirm. Optional block — omit it and the agent assumes `spy` is on PATH
  # with a single signed-in workspace (or a default set via `spy workspaces use`).
  slack:
    bin: "spy"            # path to the spy binary (default: "spy" on PATH)
    workspace: "myco"     # default Slack workspace (team domain or team_id) — required when
                          # multiple workspaces are signed in. Per-project override below.

  # Autonomy tiers — action types the agent may execute WITHOUT a human approval gate.
  # Only "draft-pr" is supported today: a draft PR merges nothing and requests no review,
  # so it is safe to create automatically (you review it on GitHub and mark it ready).
  # Everything else (Slack posts, PR approve/request-changes, issue creation, non-draft PRs)
  # always requires approval. Leave the list empty to gate everything.
  autonomy:
    auto_execute: ["draft-pr"]

  # Push notifications + remote approval via ntfy (https://ntfy.sh). Optional — omit the
  # whole `notify` block and the agent behaves exactly as before (no pushes).
  #
  # How it works: after a poll, each drafted item is pushed to `topic` with Approve / Reject
  # / Open buttons. Tapping Approve/Reject POSTs a command to `command_topic`; the local
  # approval-listener service (see scripts/install-listener.sh) reads it and executes the
  # action. So you approve work from your phone without opening Claude Code.
  #
  # SECURITY: on public ntfy.sh a topic name is effectively a password — anyone who knows
  # `command_topic` can trigger Slack posts and PR creation. Use long, random topic names,
  # set an `auth_token`, and/or self-host ntfy via `server`. Treat `command_topic` as a secret.
  notify:
    ntfy:
      server: "https://ntfy.sh"              # self-host for stronger isolation
      topic: "ea-alert-CHANGE-ME-RANDOM"     # outbound alerts — keep the name secret
      command_topic: "ea-cmd-CHANGE-ME-RANDOM"  # button taps return here — TREAT AS A PASSWORD
      auth_token: ""                         # optional ntfy access token (Bearer); recommended

# Each project is registered under a short slug.
# Run /engineer add-project from a project directory to add entries here.
projects:
  my-api:                                # short slug — used in queue items and state
    path: "/home/you/Projects/my-api"    # absolute path to the project root
    tracker: "jira"                      # "jira" | "github-issues" | "none" (default: inferred from config sections)
    github:
      owner: "myorg"
      repos: ["my-api"]
      review_requested_for: "my-username"
      ignore_labels: ["wip", "draft"]
      # issues:                          # only when tracker: github-issues
      #   assignee: "my-username"
      #   labels: []                     # optional: filter to issues with these labels
    slack:
      channels: ["C12345678"]
      keywords: ["@myname"]
      ignore_bots: true
      workspace: "myco"                  # optional: overrides agent.slack.workspace for this project
    jira:
      sources:                              # list of Jira projects to watch (N:M mapping supported)
        - project: "ENG"                    # Jira project key (required)
          components: ["api", "backend"]    # optional: only match tickets with these Jira components
          labels: []                        # optional: only match tickets with these Jira labels
        # - project: "PLAT"                 # watch a second Jira project for this repo
        #   labels: ["infra"]
      assignee: "me@example.com"            # shared across all sources
      statuses: ["To Do", "In Progress"]    # shared across all sources
    slite:
      doc_labels: ["needs-review"]
      design_doc_parent: ""              # Slite note ID or channel where design docs are created
      design_doc_template: ""            # Slite note ID of a template doc (optional, uses built-in default if empty)
    qa:
      base_url: "http://localhost:3000"  # base URL for curl commands in QA test scripts
      console_command: ""                # e.g. "rails console", "python manage.py shell", "node" (optional)
      document_to: ""                    # where to document completed QA plans: "slite" | "" (empty/absent disables)
      document_parent: ""                # Slite channel/note id for the QA doc; empty → user's private (personal) channel

  # Example: project using GitHub Issues instead of Jira
  # my-app:
  #   path: "/home/you/Projects/my-app"
  #   tracker: "github-issues"
  #   github:
  #     owner: "myorg"
  #     repos: ["my-app"]
  #     review_requested_for: "my-username"
  #     ignore_labels: ["wip", "draft"]
  #     issues:
  #       assignee: "my-username"
  #       labels: []                     # optional: filter to issues with these labels
  #   slack:
  #     channels: ["C12345678"]
  #     keywords: ["@myname"]
  #     ignore_bots: true
  #     workspace: "myco"                # optional: overrides agent.slack.workspace
